name: Add Currency

on:
  workflow_dispatch:
    inputs:
      currencyCode:
        description: 'Currency code (e.g., NOK, KRW)'
        required: true
        type: string

  issue_comment:
    types: [created]

  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  parse-currency-code:
    name: Parse Currency Code
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, 'add currency')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, 'add currency'))

    outputs:
      currency_code: ${{ steps.parse.outputs.currency_code }}
      trigger_type: ${{ steps.parse.outputs.trigger_type }}
      issue_number: ${{ steps.parse.outputs.issue_number }}

    steps:
      - name: Parse currency code from event
        id: parse
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            let code = null;
            let triggerType = 'unknown';
            let issueNumber = null;

            if (context.eventName === 'workflow_dispatch') {
              code = context.payload.inputs.currencyCode?.toUpperCase()?.trim();
              triggerType = 'manual';
            } else if (context.eventName === 'issue_comment') {
              const comment = context.payload.comment.body;
              const match = comment.match(/add\s+currency\s+([A-Z]{3})\b/i);
              if (match) {
                code = match[1].toUpperCase();
                triggerType = 'comment';
                issueNumber = context.payload.issue.number;
              }
            } else if (context.eventName === 'issues') {
              const body = context.payload.issue.body || '';
              const match = body.match(/add\s+currency\s+([A-Z]{3})\b/i);
              if (match) {
                code = match[1].toUpperCase();
                triggerType = 'issue';
                issueNumber = context.payload.issue.number;
              }
            }

            if (!code || !/^[A-Z]{3}$/.test(code)) {
              core.setFailed('No valid currency code found');
              return;
            }

            core.setOutput('currency_code', code);
            core.setOutput('trigger_type', triggerType);
            core.setOutput('issue_number', issueNumber || '');

            core.info(`Currency code: ${code}`);
            core.info(`Trigger type: ${triggerType}`);
            if (issueNumber) {
              core.info(`Issue number: ${issueNumber}`);
            }

  add-currency:
    name: Add Currency to Codebase
    runs-on: ubuntu-latest
    needs: parse-currency-code
    if: needs.parse-currency-code.outputs.currency_code != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'

      - name: Run add-currency script
        id: add
        continue-on-error: true
        env:
          CODE: ${{ needs.parse-currency-code.outputs.currency_code }}
        run: |
          node .github/scripts/add-currency.mjs > output.log 2>&1
          status=$?
          cat output.log
          exit $status

      - name: Check if currency already exists
        id: check
        if: steps.add.outcome == 'failure'
        run: |
          if grep -q "already exists" output.log; then
            echo "exists=true" >> $GITHUB_OUTPUT
            # Find line number in currencies.ts
            line=$(grep -n "code: '${{ needs.parse-currency-code.outputs.currency_code }}'" packages/loot-core/src/shared/currencies.ts | cut -d: -f1 | head -1)
            echo "line_number=$line" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.add.outcome == 'success'
        id: cpr
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: '[AI] Add ${{ needs.parse-currency-code.outputs.currency_code }} currency support'
          branch: currency/add-${{ needs.parse-currency-code.outputs.currency_code }}
          delete-branch: true
          add-paths: |
            packages/loot-core/src/shared/currencies.ts
            packages/desktop-client/src/components/settings/Currency.tsx
          title: '[AI] Add ${{ needs.parse-currency-code.outputs.currency_code }} currency support'
          body: |
            ## Add ${{ needs.parse-currency-code.outputs.currency_code }} Currency Support

            This PR was automatically generated to add support for the ${{ needs.parse-currency-code.outputs.currency_code }} currency.

            ### Changes
            - ✅ Added currency entry to `currencies.ts`
            - ✅ Added translation entry to `Currency.tsx`
            - ✅ Metadata fetched from LocalePlanet API

            ### Triggered by
            ${{ needs.parse-currency-code.outputs.trigger_type == 'issue' && format('Issue #{0}', needs.parse-currency-code.outputs.issue_number) || '' }}
            ${{ needs.parse-currency-code.outputs.trigger_type == 'comment' && format('Comment on issue #{0}', needs.parse-currency-code.outputs.issue_number) || '' }}
            ${{ needs.parse-currency-code.outputs.trigger_type == 'manual' && 'Manual workflow dispatch' || '' }}

            ### Review Checklist
            - [ ] Currency metadata is accurate
            - [ ] Symbol is correctly disambiguated (if native symbol is $)
            - [ ] Number format is appropriate for the currency's region
            - [ ] Translation is present and correct
          labels: |
            AI generated
            enhancement

      - name: Add upcoming release note file
        if: steps.add.outcome == 'success' && steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = '${{ steps.cpr.outputs.pull-request-number }}';
            const branch = 'currency/add-${{ needs.parse-currency-code.outputs.currency_code }}';
            const currencyCode = '${{ needs.parse-currency-code.outputs.currency_code }}';
            const path = `upcoming-release-notes/${prNumber}.md`;
            const content = `---\ncategory: Enhancements\nauthors: [${context.actor}]\n---\n\nAdd support for ${currencyCode} currency.\n`;

            let existingSha = null;
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: branch,
              });

              if (!Array.isArray(existing.data) && existing.data.sha) {
                existingSha = existing.data.sha;
              }
            } catch (err) {
              if (err.status !== 404) {
                throw err;
              }
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: `[AI] Add upcoming release note for #${prNumber}`,
              content: Buffer.from(content).toString('base64'),
              branch,
              sha: existingSha ?? undefined,
            });

      - name: Comment on issue - Success
        if: steps.add.outcome == 'success' && needs.parse-currency-code.outputs.issue_number != '' && steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = '${{ steps.cpr.outputs.pull-request-number }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.parse-currency-code.outputs.issue_number }},
              body: `✅ Successfully created PR #${prNumber} to add **${{ needs.parse-currency-code.outputs.currency_code }}** currency support!\n\nThe changes are ready for review.`
            });

      - name: Comment on issue - Already exists
        if: steps.check.outputs.exists == 'true' && needs.parse-currency-code.outputs.issue_number != ''
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const lineNumber = '${{ steps.check.outputs.line_number }}';
            const link = lineNumber 
              ? `[currencies.ts#L${lineNumber}](https://github.com/${{ github.repository }}/blob/master/packages/loot-core/src/shared/currencies.ts#L${lineNumber})`
              : '[currencies.ts](https://github.com/${{ github.repository }}/blob/master/packages/loot-core/src/shared/currencies.ts)';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.parse-currency-code.outputs.issue_number }},
              body: `ℹ️ Currency **${{ needs.parse-currency-code.outputs.currency_code }}** already exists in the codebase.\n\nYou can find it here: ${link}`
            });

      - name: Comment on issue - Failure
        if: steps.add.outcome == 'failure' && steps.check.outputs.exists != 'true' && needs.parse-currency-code.outputs.issue_number != ''
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.parse-currency-code.outputs.issue_number }},
              body: `❌ Failed to add currency **${{ needs.parse-currency-code.outputs.currency_code }}**.\n\nThis could be because:\n- The currency code is not found in the LocalePlanet API\n- There was an error parsing the currency data\n\nPlease check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for more details.`
            });

      - name: Fail workflow if add failed
        if: steps.add.outcome == 'failure' && steps.check.outputs.exists != 'true'
        run: |
          echo "::error::Failed to add currency ${{ needs.parse-currency-code.outputs.currency_code }}"
          cat output.log
          exit 1
