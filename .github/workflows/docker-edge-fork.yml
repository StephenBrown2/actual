name: Build Edge Docker Image (Fork)

# Edge Docker images for forks - pushes to GHCR only (no Docker Hub)
# Runs on every push to master in a fork, or via workflow_dispatch
on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: docker-edge-fork
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  # Creates the following tags:
  # - actual-server:edge
  TAGS: |
    type=edge,value=edge
    type=sha

jobs:
  build:
    if: github.event.repository.fork
    name: Build Docker image (fork)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image owner (lowercase for GHCR)
        id: owner
        run: |
          repo=${GITHUB_REPOSITORY,,}
          echo "repo=${repo}" >> $GITHUB_OUTPUT
          echo "owner=${repo%/*}" >> $GITHUB_OUTPUT

      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: |
            ghcr.io/${{ steps.owner.outputs.repo }}-server
          flavor: suffix=-alpine
          tags: ${{ env.TAGS }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Building outside of the docker image allows us to build once and push to multiple platforms
      # This is faster and avoids yarn memory issues
      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          # Skip setup's translation checkout - GITHUB_TOKEN from forks has limited
          # cross-repo access. package-browser will clone translations itself via git.
          download-translations: false
      - name: Build Web
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: yarn build:server

      - name: Build image for testing
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: false
          load: true
          file: packages/sync-server/docker/alpine.Dockerfile
          tags: actual-server-testing

      - name: Test that the docker image boots
        run: |
          docker run --detach --network=host actual-server-testing
          sleep 5
          curl --fail -sS -LI -w '%{http_code}\n' --retry 10 --retry-delay 1 --retry-connrefused localhost:5006

      # This will use the cache from the earlier build step and not rebuild the image
      # https://docs.docker.com/build/ci/github-actions/test-before-push/
      - name: Build and push images
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          file: packages/sync-server/docker/alpine.Dockerfile
          platforms: linux/amd64 #,linux/arm64,linux/arm/v7,linux/arm/v6
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
